<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>MeteoAgro - Sistema Agronômico</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04101f;--bg2:#071828;--bg3:#0b1f35;
  --card:rgba(11,31,53,0.9);--border:rgba(56,139,253,0.18);
  --accent:#38b6ff;--accent2:#ff8c38;
  --ecmwf:#34d399;--gfs:#f97316;
  --text:#ddeeff;--muted:#6a8fad;--rain:#60a5fa;--danger:#f87171;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(56,139,253,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(56,139,253,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{max-width:860px;margin:0 auto;padding:14px 14px 40px;position:relative;z-index:1}
header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px;gap:10px;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;white-space:nowrap}
.logo .l1{color:var(--accent)}.logo .l2{color:var(--accent2)}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:22px;padding:9px 40px 9px 36px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.sico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.9rem}
.gps-ico{position:absolute;right:9px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--accent);cursor:pointer;font-size:1rem;padding:4px;display:flex;align-items:center;justify-content:center}
.gps-ico.spin{animation:rot .8s linear infinite}
@keyframes rot{to{transform:translateY(-50%) rotate(360deg)}}
.dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--bg3);border:1px solid var(--border);border-radius:14px;overflow:hidden;z-index:50;box-shadow:0 8px 32px rgba(0,0,0,.6);display:none}
.dropdown.open{display:block}
.drop-item{padding:11px 15px;font-size:.81rem;cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:flex-start;gap:8px}
.drop-item:hover{background:rgba(56,182,255,.08)}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--bg3);border-radius:12px;padding:4px;border:1px solid var(--border)}
.tab{flex:1;padding:8px 2px;border:none;border-radius:8px;background:transparent;color:var(--muted);font-size:.74rem;font-weight:500;cursor:pointer;text-align:center}
.tab.active{background:var(--accent);color:#000;font-weight:700}
.pane{display:none}.pane.active{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.sbox{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:14px;text-align:center}
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .8s linear infinite}
.hero{background:linear-gradient(145deg,#0b2540,#061523);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.btemp{font-family:'Bebas Neue',sans-serif;font-size:4.5rem;line-height:1;color:#fff}
.btemp sup{font-size:1.8rem;vertical-align:top;color:var(--accent)}
.hico{font-size:3.5rem}
.hdesc{font-size:1rem;color:var(--accent);font-weight:500}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.gst{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:9px 8px;text-align:center}
.gst-l{font-size:.62rem;color:var(--muted);text-transform:uppercase}
.gst-v{font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:600}
.rain-box{background:linear-gradient(135deg,rgba(96,165,250,.1),rgba(56,182,255,.03));border:1px solid rgba(96,165,250,.25);border-radius:16px;padding:18px;margin-bottom:14px}
.rtitle{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;color:var(--rain);margin-bottom:12px}
.rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.rgc{background:rgba(255,255,255,.04);border:1px solid rgba(96,165,250,.2);border-radius:10px;padding:10px 8px;text-align:center}
.rgc-l{font-size:.62rem;color:var(--muted);text-transform:uppercase}
.rgc-v{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:var(--rain)}
.bars-scroll{overflow-x:auto;padding-bottom:4px}
.bars-inner{display:flex;gap:4px;align-items:flex-end;min-width:max-content}
.bc{display:flex;flex-direction:column;align-items:center;width:38px}
.bbar{width:26px;border-radius:4px 4px 0 0;min-height:3px;background:rgba(96,165,250,.3)}
.bbar.wet{background:linear-gradient(to top,#1d4ed8,var(--rain))}
.hscroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:14px}
.hcard{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:9px 11px;text-align:center;min-width:64px}
.sec{font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;color:var(--muted);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.drow{display:grid;grid-template-columns:86px 33px 1fr 50px 50px;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px 13px;margin-bottom:7px}
.sat-frame iframe{width:100%;height:460px;border:none;border-radius:15px;border:1px solid var(--border)}
@media(max-width:580px){.g4{grid-template-columns:repeat(2,1fr)}.btemp{font-size:3.5rem}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo"><span class="l1">METEO</span><span class="l2">AGRO</span></div>
  <div class="search-wrap">
    <span class="sico">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar cidade ou fazenda..." autocomplete="off">
    <button class="gps-ico" id="gpsBtn" onclick="triggerGPS()">📡</button>
    <div class="dropdown" id="dropdown"></div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" onclick="showTab('agora',this)">🌡️ Agora</button>
  <button class="tab" onclick="showTab('previsao',this)">📅 7 Dias</button>
  <button class="tab" onclick="showTab('modelos',this)">📡 Modelos</button>
  <button class="tab" onclick="showTab('satelite',this)">🚀 Satélite</button>
</div>
<div class="pane active" id="pane-agora">
  <div class="sbox" id="st-agora"><div class="spinner"></div><div class="smsg">Sincronizando posição...</div></div>
  <div id="data-agora" style="display:none">
    <div class="hero">
      <div class="hero-top">
        <div><div class="btemp" id="hTemp">--<sup>°C</sup></div><div class="hdesc" id="hDesc">--</div><div id="hSub" style="font-size:.7rem;color:var(--muted)"></div></div>
        <div class="hico" id="hIco">☀️</div>
      </div>
      <div class="g4">
        <div class="gst"><div class="gst-l">Sensação</div><div class="gst-v" id="hFeel">--</div></div>
        <div class="gst"><div class="gst-l">Umidade</div><div class="gst-v" id="hHum">--</div></div>
        <div class="gst"><div class="gst-l">Vento</div><div class="gst-v" id="hWind">--</div></div>
        <div class="gst"><div class="gst-l">Nuvens</div><div class="gst-v" id="hCloud">--</div></div>
      </div>
    </div>
    <div class="rain-box">
      <div class="rtitle">🌧️ Volume Próximas 24h</div>
      <div class="rgrid">
        <div class="rgc"><div class="rgc-l">Agora</div><div class="rgc-v" id="rNow">--</div></div>
        <div class="rgc"><div class="rgc-l">6 Horas</div><div class="rgc-v" id="r6h">--</div></div>
        <div class="rgc"><div class="rgc-l">24 Horas</div><div class="rgc-v" id="r24h">--</div></div>
      </div>
      <div class="bars-scroll"><div class="bars-inner" id="rainBars"></div></div>
    </div>
    <div class="sec">Próximas Horas</div>
    <div class="hscroll" id="hourlyScroll"></div>
  </div>
</div>
<div class="pane" id="pane-previsao"><div class="sec">Previsão 7 Dias</div><div id="dailyList"></div></div>
<div class="pane" id="pane-modelos"><div id="modelCompare"></div></div>
<div class="pane" id="pane-satelite"><div class="sat-frame"><iframe id="windyFrame"></iframe></div></div>
</div>
<script>
let LAT = -17.7853, LON = -50.9202, LOCNAME = 'Rio Verde, GO'; // Default caso GPS falhe
const WEATHER_CODES = {0:['☀️','Céu limpo'],1:['🌤️','Predom. limpo'],2:['⛅','Parcial nublado'],3:['☁️','Nublado'],61:['🌧️','Chuva leve'],63:['🌧️','Chuva mod.'],80:['🌦️','Pancadas'],95:['⛈️','Trovoada']};
function getIcon(c){return WEATHER_CODES[c]||['🌤️','Variável']};

async function loadData(){
  document.getElementById('st-agora').style.display = 'flex';
  try{
    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,cloud_cover&hourly=temperature_2m,precipitation,precipitation_probability,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`);
    const data = await res.json();
    render(data);
    document.getElementById('st-agora').style.display = 'none';
    document.getElementById('data-agora').style.display = 'block';
  }catch(e){alert('Erro ao carregar dados.')}
}

function render(d){
  const c = d.current;
  const [ico, desc] = getIcon(c.weather_code);
  document.getElementById('hTemp').innerHTML = Math.round(c.temperature_2m)+'<sup>°C</sup>';
  document.getElementById('hDesc').innerText = desc;
  document.getElementById('hSub').innerText = LOCNAME;
  document.getElementById('hIco').innerText = ico;
  document.getElementById('hFeel').innerText = Math.round(c.apparent_temperature)+'°C';
  document.getElementById('hHum').innerText = c.relative_humidity_2m+'%';
  document.getElementById('hWind').innerText = Math.round(c.wind_speed_10m)+' km/h';
  document.getElementById('hCloud').innerText = c.cloud_cover+'%';
  
  let rainHtml = '';
  d.hourly.time.slice(0,24).forEach((t,i)=>{
    const mm = d.hourly.precipitation[i];
    const h = Math.max(3, mm*10);
    rainHtml += `<div class="bc"><div style="font-size:10px;color:var(--rain)">${mm>0?mm.toFixed(1):''}</div><div class="bbar ${mm>0?'wet':''}" style="height:${h}px"></div><div style="font-size:9px;color:var(--muted)">${t.slice(11,16)}</div></div>`;
  });
  document.getElementById('rainBars').innerHTML = rainHtml;

  let dailyHtml = '';
  d.daily.time.forEach((t,i)=>{
    const [icoDay] = getIcon(d.daily.weather_code[i]);
    dailyHtml += `<div class="drow"><div>${t.slice(8,10)}/${t.slice(5,7)}</div><div>${icoDay}</div><div style="flex:1"></div><div style="color:var(--rain)">${Math.round(d.daily.temperature_2m_min[i])}°</div><div style="color:var(--accent2)">${Math.round(d.daily.temperature_2m_max[i])}°</div></div>`;
  });
  document.getElementById('dailyList').innerHTML = dailyHtml;
}

function triggerGPS(){
  navigator.geolocation.getCurrentPosition(p=>{
    LAT=p.coords.latitude; LON=p.coords.longitude; LOCNAME="Minha Posição"; loadData();
  }, ()=>loadData());
}

function showTab(id,btn){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
  btn.classList.add('active');
  if(id==='satelite') document.getElementById('windyFrame').src=`https://embed.windy.com/embed2.html?lat=${LAT}&lon=${LON}&zoom=6&level=surface&overlay=clouds&product=ecmwf&marker=true`;
}

// Inicialização com timer de segurança
setTimeout(()=>{ if(document.getElementById('data-agora').style.display === 'none') loadData(); }, 5000);
triggerGPS();
</script>
</body>
</html>
