<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AgroSat Pro - MetOp & GOES</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #2e7d32; --dark: #1b5e20; --accent: #ffd600; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Roboto', sans-serif; background: #fff; overflow: hidden; }
        
        #map { height: 45vh; width: 100%; border-bottom: 2px solid var(--primary); }
        
        .header {
            background: var(--primary); color: white; padding: 12px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000;
        }

        .btn-gps {
            background: var(--accent); border: none; padding: 10px 15px;
            border-radius: 5px; font-weight: bold; cursor: pointer; color: #000;
        }

        .weather-content {
            height: 55vh; overflow-y: auto; padding: 15px; box-sizing: border-box;
        }

        .forecast-grid {
            display: flex; overflow-x: auto; gap: 10px; padding: 10px 0;
            scrollbar-width: thin;
        }

        .forecast-card {
            min-width: 90px; background: #f1f8e9; padding: 12px;
            border-radius: 10px; text-align: center; border: 1px solid #c8e6c9;
        }

        .daily-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem;
        }

        .loading-msg { color: #666; font-style: italic; text-align: center; padding: 20px; }
        
        h3 { margin: 15px 0 5px 0; color: var(--dark); font-size: 1.1rem; border-left: 4px solid var(--accent); padding-left: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 1.1rem; font-weight: bold;">AGROSAT PRO</div>
        <button class="btn-gps" onclick="getLocation()">MINHA ÁREA</button>
    </div>

    <div id="map"></div>

    <div class="weather-content">
        <div id="status-loc" style="font-weight: bold; color: #333;">Aguardando localização...</div>
        
        <h3>Hoje (Hora em Hora)</h3>
        <div class="forecast-grid" id="hourly-forecast">
            <div class="loading-msg">Clique em "Minha Área" para carregar...</div>
        </div>

        <h3>Próximos 7 Dias</h3>
        <div id="daily-forecast">
            <div class="loading-msg">Aguardando dados...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        let map, marker;
        // Ponto inicial: Urbano Santos/MA (visto no seu print)
        const initPos = [-3.4194, -43.4648];

        function initMap() {
            map = L.map('map').setView(initPos, 8);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OSM'
            }).addTo(map);

            // Camada GOES-16 Geocolor (Nuvens em tempo real)
            const goes = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/GOES-East_ABI_GeoColor/default/current/GoogleMapsCompatible_Level9/{z}/{y}/{x}.jpg', {
                opacity: 0.7, attribution: 'NOAA GOES'
            }).addTo(map);

            // Camada MetOp (Temperatura da Superfície/Atmosfera)
            const metop = L.tileLayer('https://gibs.earthdata.nasa.gov/wmts/epsg3857/best/MetOp_B_AVHRR_Sea_Surface_Temperature/default/current/GoogleMapsCompatible_Level7/{z}/{y}/{x}.png', {
                opacity: 0.5, attribution: 'EUMETSAT'
            });

            L.control.layers(null, {"Nuvens GOES": goes, "MetOp Temp": metop}).addTo(map);
            
            // Carrega previsão inicial
            fetchWeather(initPos[0], initPos[1]);
        }

        async function fetchWeather(lat, lon) {
            const hourlyDiv = document.getElementById('hourly-forecast');
            const dailyDiv = document.getElementById('daily-forecast');
            
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,precipitation&daily=temperature_2m_max,temperature_2m_min,precipitation_sum&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();

                // Limpar e preencher Hora em Hora
                hourlyDiv.innerHTML = '';
                for(let i = 0; i < 24; i++) {
                    const hora = new Date(data.hourly.time[i]).getHours();
                    hourlyDiv.innerHTML += `
                        <div class="forecast-card">
                            <div style="font-size: 0.8rem;">${hora}:00</div>
                            <div style="font-size: 1.1rem; font-weight:bold; color:#d32f2f;">${Math.round(data.hourly.temperature_2m[i])}°</div>
                            <div style="font-size: 0.75rem; color:#1b5e20;">🌧️${data.hourly.precipitation[i]}mm</div>
                        </div>`;
                }

                // Limpar e preencher 7 Dias
                dailyDiv.innerHTML = '';
                data.daily.time.forEach((date, i) => {
                    const diaFormat = new Date(date).toLocaleDateString('pt-BR', {weekday: 'short', day: 'numeric'});
                    dailyDiv.innerHTML += `
                        <div class="daily-item">
                            <span style="width: 80px; font-weight:bold;">${diaFormat}</span>
                            <span style="color: #1976d2;">🌧️ ${data.daily.precipitation_sum[i]}mm</span>
                            <span>
                                <b style="color:#d32f2f;">${Math.round(data.daily.temperature_2m_max[i])}°</b> / 
                                <b style="color:#1976d2;">${Math.round(data.daily.temperature_2m_min[i])}°</b>
                            </span>
                        </div>`;
                });

            } catch (e) {
                hourlyDiv.innerHTML = '<div class="loading-msg">Erro ao carregar dados. Verifique a conexão.</div>';
            }
        }

        function getLocation() {
            if (navigator.geolocation) {
                document.getElementById('status-loc').innerText = "Buscando satélites...";
                navigator.geolocation.getCurrentPosition(p => {
                    const { latitude, longitude } = p.coords;
                    document.getElementById('status-loc').innerText = `Local: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                    map.setView([latitude, longitude], 11);
                    
                    if(marker) map.removeLayer(marker);
                    marker = L.marker([latitude, longitude]).addTo(map);
                    
                    fetchWeather(latitude, longitude);
                }, () => {
                    alert("Erro ao obter GPS. Verifique se o local está ativo.");
                });
            }
        }

        window.onload = initMap;
    </script>
</body>
</html>
