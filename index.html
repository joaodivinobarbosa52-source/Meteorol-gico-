<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeteoAgro - Localização Atual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050d1a;
    --bg2: #081527;
    --bg3: #0d1f38;
    --card: rgba(13,31,56,0.9);
    --border: rgba(56,139,253,0.2);
    --accent: #38b6ff;
    --accent2: #ff7b2f;
    --ecmwf: #4ade80;
    --gfs: #fb923c;
    --text: #e2eaf4;
    --muted: #7a9abf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  .container { max-width: 500px; margin: 0 auto; padding: 15px; }

  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; }
  .logo span { color: var(--accent2); }

  .loc-bar { 
    background: var(--bg3); 
    padding: 12px; 
    border-radius: 12px; 
    font-size: 0.85rem; 
    border: 1px solid var(--border); 
    color: var(--accent); 
    text-align: center;
    font-weight: bold;
    margin-bottom: 15px;
    display: flex;
    justify-content: center;
    gap: 10px;
  }

  .tabs { display: flex; gap: 5px; background: var(--bg3); padding: 5px; border-radius: 12px; margin-bottom: 15px; }
  .tab { flex: 1; padding: 12px; border: none; border-radius: 8px; background: transparent; color: var(--muted); font-weight: 600; font-size: 0.7rem; cursor: pointer; }
  .tab.active { background: var(--accent); color: #000; }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 12px; }
  .temp-val { font-size: 3.2rem; font-weight: 700; font-family: 'JetBrains Mono', monospace; margin: 5px 0; color: #fff; }
  .label-mod { font-size: 0.7rem; text-transform: uppercase; color: var(--muted); font-weight: bold; }

  .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
  .s-box { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
  .s-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .s-value { font-size: 1rem; font-weight: 600; }

  .loader { text-align: center; padding: 40px; }
  .spinner { width: 30px; height: 30px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: 0; } }

  iframe { width: 100%; height: 480px; border: none; border-radius: 16px; border: 1px solid var(--border); }
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">METEO<span>AGRO</span></div>
  </header>

  <div class="loc-bar" id="txtLocal">
    📍 <span id="coordsDisplay">Buscando sua localização...</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="trocarAba(event, 'aba-agora')">🌡️ AGORA</button>
    <button class="tab" onclick="trocarAba(event, 'aba-modelos')">📡 MODELOS</button>
    <button class="tab" onclick="trocarAba(event, 'aba-satelite')">🛰️ SATÉLITE</button>
  </div>

  <div id="carregando" class="loader">
    <div class="spinner"></div>
    <p style="font-size:0.8rem; color:var(--muted)">Sincronizando com sua posição atual...</p>
  </div>

  <div id="painel" style="display:none">
    <div id="aba-agora" class="tab-content active">
      <div class="card" style="background: linear-gradient(135deg, #0d2a4a 0%, #050d1a 100%);">
        <div style="display:flex; justify-content:space-between; align-items:center">
          <div>
            <div class="label-mod">Tempo Real na sua Região</div>
            <div class="temp-val" id="res-temp">--°</div>
          </div>
          <div style="font-size: 3.5rem">🌦️</div>
        </div>
        <div class="grid-stats">
          <div class="s-box"><div class="s-label">Umidade</div><div class="s-value" id="res-hum">--</div></div>
          <div class="s-box"><div class="s-label">Vento</div><div class="s-value" id="res-vento">--</div></div>
          <div class="s-box"><div class="s-label">Chuva 1h</div><div class="s-value" id="res-chuva">--</div></div>
          <div class="s-box"><div class="s-label">Sensação</div><div class="s-value" id="res-sente">--</div></div>
        </div>
      </div>
    </div>

    <div id="aba-modelos" class="tab-content">
      <div class="card" style="border-left: 5px solid var(--ecmwf);">
        <div class="label-mod" style="color:var(--ecmwf)">Europeu (ECMWF)</div>
        <div class="temp-val" id="mod-ec">--°</div>
      </div>
      <div class="card" style="border-left: 5px solid var(--gfs);">
        <div class="label-mod" style="color:var(--gfs)">Americano (GFS)</div>
        <div class="temp-val" id="mod-gfs">--°</div>
      </div>
    </div>

    <div id="aba-satelite" class="tab-content">
      <iframe id="mapa-windy"></iframe>
    </div>
  </div>
</div>

<script>
let lat, lon;

async function carregarDados() {
  if (!lat || !lon) return;

  const loader = document.getElementById('carregando');
  const painel = document.getElementById('painel');
  
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,wind_speed_10m&models=ecmwf_ifs04,gfs_seamless&timezone=auto`;
    const resposta = await fetch(url);
    const dados = await resposta.json();
    const c = dados.current;

    document.getElementById('res-temp').innerText = Math.round(c.temperature_2m_ecmwf_ifs04 || c.temperature_2m_gfs_seamless) + "°";
    document.getElementById('res-hum').innerText = (c.relative_humidity_2m_ecmwf_ifs04 || c.relative_humidity_2m_gfs_seamless) + "%";
    document.getElementById('res-vento').innerText = (c.wind_speed_10m_ecmwf_ifs04 || c.wind_speed_10m_gfs_seamless) + " km/h";
    document.getElementById('res-chuva').innerText = (c.precipitation_ecmwf_ifs04 || 0) + " mm";
    document.getElementById('res-sente').innerText = Math.round(c.apparent_temperature_ecmwf_ifs04 || 0) + "°";

    document.getElementById('mod-ec').innerText = Math.round(c.temperature_2m_ecmwf_ifs04) + "°";
    document.getElementById('mod-gfs').innerText = Math.round(c.temperature_2m_gfs_seamless) + "°";

    loader.style.display = 'none';
    painel.style.display = 'block';
    atualizarSatelite();

  } catch (erro) {
    console.error(erro);
    document.getElementById('carregando').innerHTML = "Erro ao carregar dados locais.";
  }
}

function iniciarApp() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      lat = pos.coords.latitude;
      lon = pos.coords.longitude;
      document.getElementById('coordsDisplay').innerText = `Sua Posição: ${lat.toFixed(3)}, ${lon.toFixed(3)}`;
      carregarDados();
    }, () => {
      document.getElementById('coordsDisplay').innerText = "GPS Negado. Clique em '📍 GPS' para permitir.";
      // Caso negue, não carrega automático para não mostrar Brasília sem você querer
      document.getElementById('carregando').innerHTML = "Aguardando permissão de localização...";
    });
  }
}

function trocarAba(e, id) {
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  e.currentTarget.classList.add('active');
}

function atualizarSatelite() {
  const iframe = document.getElementById('mapa-windy');
  iframe.src = `https://embed.windy.com/embed2.html?lat=${lat}&lon=${lon}&zoom=6&level=surface&overlay=radar&product=ecmwf&menu=&message=true&marker=true&calendar=now&pressure=true&type=map&location=coordinates&detail=true&metricWind=km%2Fh&metricTemp=%C2%B0C&radarRange=-1`;
}

// Inicia tentando pegar sua localização direto
iniciarApp();
</script>
</body>
</html>
